security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    providers:
        sonata_user_bundle:
            id: sonata.user.security.user_provider

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        api_login:
            pattern: ^/api/auth/login$
            stateless: true
            provider: sonata_user_bundle
            json_login:
                check_path: /api/auth/login
                username_path: username
                password_path: password
                success_handler: App\Security\ApiLoginSuccessHandler
                failure_handler: App\Security\ApiLoginFailureHandler
        api:
            pattern: ^/api
            stateless: true
            provider: sonata_user_bundle
            access_token:
                token_handler: App\Security\ApiAccessTokenHandler
        admin:
            pattern: ^/admin
            lazy: true
            provider: sonata_user_bundle
            form_login:
                login_path: sonata_user_admin_security_login
                check_path: sonata_user_admin_security_check
                default_target_path: sonata_admin_dashboard
                use_referer: true
                enable_csrf: true
            logout:
                path: sonata_user_admin_security_logout
                target: sonata_user_admin_security_login
        main:
            lazy: true
            provider: sonata_user_bundle

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/api/auth/login$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/google$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/otp/send$, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/otp/verify$, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login$, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login_check$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
